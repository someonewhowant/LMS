<div class="border border-slate-700/60 rounded-xl overflow-hidden flex flex-col bg-slate-900" 
     [class.border-indigo-500]="isDragging()"
     (dragover)="onDragOver($event)" 
     (dragleave)="onDragLeave($event)" 
     (drop)="onDrop($event)">
  
  <!-- Toolbar -->
  <div class="flex flex-wrap items-center justify-between p-2 border-b border-slate-700/60 bg-slate-800/50">
    <!-- Formatting Tools -->
    <div class="flex items-center gap-1">
      <button type="button" (click)="formatBold()" title="Жирный" class="p-1.5 text-slate-400 hover:text-white hover:bg-slate-700 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 4h8a4 4 0 014 4 4 4 0 01-4 4H6z M6 12h9a4 4 0 014 4 4 4 0 01-4 4H6z"/></svg>
      </button>
      <button type="button" (click)="formatItalic()" title="Курсив" class="p-1.5 text-slate-400 hover:text-white hover:bg-slate-700 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4-4m-4 4l-4-4m-4 12l-4 4m4-4l4 4"/></svg>
      </button>
      <div class="w-px h-4 bg-slate-700 mx-1"></div>
      <button type="button" (click)="formatHeading()" title="Заголовок" class="p-1.5 text-slate-400 hover:text-white hover:bg-slate-700 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
      </button>
      <button type="button" (click)="formatList()" title="Список" class="p-1.5 text-slate-400 hover:text-white hover:bg-slate-700 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
      </button>
      <button type="button" (click)="formatQuote()" title="Цитата" class="p-1.5 text-slate-400 hover:text-white hover:bg-slate-700 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
      </button>
      <div class="w-px h-4 bg-slate-700 mx-1"></div>
      <button type="button" (click)="formatLink()" title="Ссылка" class="p-1.5 text-slate-400 hover:text-white hover:bg-slate-700 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
      </button>
      <button type="button" (click)="formatCode()" title="Код" class="p-1.5 text-slate-400 hover:text-white hover:bg-slate-700 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4-4m-4 4l-4-4m-4 12l-4 4m4-4l4 4"/></svg>
      </button>
      <button type="button" (click)="triggerImageUpload()" title="Загрузить изображение" class="p-1.5 text-slate-400 hover:text-indigo-400 hover:bg-slate-700 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2-2v12a2 2 0 002 2z"/></svg>
      </button>
      <button type="button" (click)="triggerMdUpload()" title="Загрузить из .md файла" class="p-1.5 text-slate-400 hover:text-indigo-400 hover:bg-slate-700 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      </button>
      @if (isUploading()) {
        <span class="ml-2 text-[10px] text-indigo-400 font-medium animate-pulse">Загрузка...</span>
      }
    </div>

    <!-- View Modes -->
    <div class="flex items-center gap-1 bg-slate-900 rounded-lg p-0.5 border border-slate-700/50">
      <button type="button" (click)="setViewMode('write')" [class]="viewMode() === 'write' ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-white'" class="px-3 py-1 text-[11px] font-semibold rounded-md transition-colors">Написать</button>
      <button type="button" (click)="setViewMode('preview')" [class]="viewMode() === 'preview' ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-white'" class="px-3 py-1 text-[11px] font-semibold rounded-md transition-colors">Превью</button>
      <button type="button" (click)="setViewMode('split')" [class]="viewMode() === 'split' ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-white'" class="hidden md:block px-3 py-1 text-[11px] font-semibold rounded-md transition-colors">Сплит</button>
    </div>
  </div>

  <!-- Hidden Inputs -->
  <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" class="hidden">
  <input type="file" #mdFileInput (change)="onMdFileSelected($event)" accept=".md" class="hidden">

  <!-- Editor Area -->
  <div class="flex min-h-[400px] h-full">
    <!-- Write -->
    @if (viewMode() === 'write' || viewMode() === 'split') {
      <div [class]="viewMode() === 'split' ? 'w-1/2 border-r border-slate-700/60' : 'w-full'" class="flex flex-col">
        <textarea #textareaRef
                  [ngModel]="value()"
                  (input)="onInput($event)"
                  placeholder="Пишите здесь... Поддерживается Markdown и drag-and-drop картинок."
                  class="w-full h-[400px] sm:h-[500px] bg-transparent text-slate-300 p-4 resize-y focus:outline-none focus:ring-0 font-mono text-sm leading-relaxed"></textarea>
      </div>
    }
    
    <!-- Preview -->
    @if (viewMode() === 'preview' || viewMode() === 'split') {
      <div [class]="viewMode() === 'split' ? 'w-1/2' : 'w-full'" class="flex flex-col">
        <div class="w-full h-[400px] sm:h-[500px] p-6 overflow-y-auto bg-slate-950/40 custom-scrollbar" 
             [innerHTML]="parseMarkdown(value() || '*Превью появится здесь...*')">
        </div>
      </div>
    }
  </div>

  <!-- Drag Overlay -->
  @if (isDragging()) {
    <div class="absolute inset-0 bg-indigo-900/20 backdrop-blur-sm border-2 border-dashed border-indigo-500 rounded-xl flex items-center justify-center pointer-events-none z-10">
      <div class="bg-indigo-600 px-6 py-3 rounded-2xl text-white font-bold shadow-2xl flex items-center gap-3">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        Отпустите, чтобы загрузить
      </div>
    </div>
  }
</div>
