<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-surface flex items-center justify-between px-margin-mobile py-4 transition-all duration-200">

<span class="material-symbols-outlined text-primary" data-icon="school">school</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">EduFlow</h1>
</div>

</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile py-10 max-w-[480px] mx-auto w-full">
<!-- Visual Accent -->
<div class="mb-8 relative w-full aspect-video rounded-xl overflow-hidden ambient-shadow">
<img class="w-full h-full object-cover" data-alt="A clean, minimalist digital classroom scene with soft indigo and slate blue colors. The image shows a sleek laptop on a white desk with blurred educational icons floating subtly in the background under bright, high-key studio lighting. The overall mood is academic, professional, and trustworthy, reflecting a premium online learning environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAb7yVH8YcREwV6JW3J1MU6jLKA-OZViQfkc1kez2Td3Ennz8VxfFwrGMOJ7305W2AuIFUzs1Qbh-kylVUSm29L9wU03hoLoGMIG2_PN53SX1j613NpgvCOsgzO9yCprrLMXBWfNxVBIkUqw88wLY3KOxDS_N81oHGIWcHuH5rOFYnAKvea4MxuDQUFw7Fh4lAlyUN5B1dG1h6SEkyGByLJEh1nyijTbx71916W1xYve7nFL1zVPYIUIKjy8mM7lWlYs4PEXzvgny8_"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
</div>
<!-- Login Form Container -->
<div class="w-full bg-surface-container-lowest p-gutter rounded-xl ambient-shadow border border-outline-variant/30">
<div class="mb-6">
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Welcome Back</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Please enter your credentials to continue your journey.</p>
</div>
<form class="space-y-5" id="loginForm">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email</label>
<div class="relative focus-glow rounded-lg">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg font-body-md text-body-md focus:border-primary focus:ring-0 transition-colors placeholder:text-outline/50" id="email" name="email" placeholder="e.g. student@eduflow.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<div class="relative focus-glow rounded-lg">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-white border border-outline-variant rounded-lg font-body-md text-body-md focus:border-primary focus:ring-0 transition-colors placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline hover:text-primary transition-colors" data-icon="visibility" id="togglePassword" type="button">visibility</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-0" type="checkbox"/>
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember Me</span>
</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all active:scale-95" href="#">Forgot Password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full py-3.5 bg-primary-container text-on-primary-container font-headline-md text-headline-md rounded-lg shadow-md hover:opacity-90 active:scale-[0.98] transition-all duration-200 mt-4" type="submit">
                    Sign In
                </button>
</form>
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-outline-variant"></span>
</div>
<div class="relative flex justify-center text-label-sm">

</div>
</div>

<span class="font-label-md text-label-md">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-2.5 border border-outline-variant rounded-lg hover:bg-surface-container transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface" data-icon="terminal" style="font-variation-settings: 'FILL' 1;">terminal</span>

<div class="flex gap-6">
<a class="font-label-md text-label-md text-secondary hover:text-primary-container transition-colors active:scale-95" href="#">Register as Student</a>
<div class="w-px h-4 bg-outline-variant"></div>
<a class="font-label-md text-label-md text-secondary hover:text-primary-container transition-colors active:scale-95" href="#">Register as Teacher</a>
</div>
<p class="font-label-md text-label-md text-primary font-bold">© 2024 EduFlow LMS</p>
</footer>
<script>
        // Password visibility toggle
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggleBtn.textContent = type === 'password' ? 'visibility' : 'visibility_off';
            toggleBtn.setAttribute('data-icon', type === 'password' ? 'visibility' : 'visibility_off');
        });

        // Form submission micro-interaction
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                alert('Login system simulation: Account verification triggered.');
            }, 1500);
        });

        // Subtle parallax effect for the hero image
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const hero = document.querySelector('img[data-alt]');
            if(hero) {
                hero.style.transform = `translateY(${scrolled * 0.1}px)`;
            }
        });
    </script>
